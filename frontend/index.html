<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UPAY – NGO Finance Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2744;--navy-mid:#163356;--navy-light:#1E4070;
  --teal:#2E9E8E;--teal-light:#3DBDAA;--teal-pale:#D6F2EF;
  --amber:#F5A623;--amber-pale:#FEF3DC;
  --red:#E05252;--red-pale:#FDEAEA;
  --green:#3CB371;--green-pale:#E3F5EB;
  --gray-100:#F7F9FC;--gray-200:#EDF0F5;--gray-300:#D4DAE6;--gray-400:#9AA3B4;--gray-600:#5A6478;--gray-800:#2D3447;
  --white:#FFFFFF;
  --shadow-sm:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.10);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --radius:10px;--radius-lg:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--gray-100);color:var(--gray-800);min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Playfair Display',serif}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .3s}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo .brand{font-family:'Playfair Display',serif;font-size:22px;color:#fff;letter-spacing:.5px}
.sidebar-logo .tagline{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.sidebar-nav{padding:16px 0;flex:1;overflow-y:auto}
.nav-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3);padding:12px 24px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;color:rgba(255,255,255,.65);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .2s;border-left:3px solid transparent;text-decoration:none}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.10);border-left-color:var(--teal-light)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.logout-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;width:100%;transition:all .2s}
.logout-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.topbar-title{font-size:20px;font-weight:700;color:var(--navy)}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--gray-100);border-radius:24px;padding:6px 14px 6px 8px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.user-name{font-size:13px;font-weight:600;color:var(--navy)}
.role-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;border-radius:20px}
.role-badge.admin{background:var(--amber-pale);color:#B07200}
.role-badge.staff{background:var(--teal-pale);color:var(--teal)}
.page-content{padding:28px 32px;flex:1}
.card{background:#fff;border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;opacity:.07}
.stat-card.blue::after{background:var(--navy)}
.stat-card.teal::after{background:var(--teal)}
.stat-card.amber::after{background:var(--amber)}
.stat-card.green::after{background:var(--green)}
.stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);margin-bottom:8px}
.stat-value{font-size:26px;font-weight:700;color:var(--navy);font-family:'Playfair Display',serif}
.stat-value.teal{color:var(--teal)}
.stat-value.amber{color:var(--amber)}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-sub{font-size:12px;color:var(--gray-400);margin-top:4px}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--gray-200)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead{background:var(--navy)}
thead th{color:#fff;font-weight:600;padding:13px 16px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--gray-200);transition:background .15s}
tbody tr:hover{background:var(--gray-100)}
tbody tr:last-child{border-bottom:none}
td{padding:12px 16px;color:var(--gray-600);vertical-align:middle}
td.fw{font-weight:600;color:var(--gray-800)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-600)}
.form-group input,.form-group select,.form-group textarea{border:1.5px solid var(--gray-300);border-radius:8px;padding:10px 13px;font-size:14px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--gray-800);transition:border-color .2s,box-shadow .2s;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,158,142,.12)}
.form-group input.err,.form-group select.err{border-color:var(--red)}
.err-msg{font-size:11px;color:var(--red);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:8px;font-size:13.5px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-light);box-shadow:0 4px 12px rgba(46,158,142,.3)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-light)}
.btn-danger{background:var(--red-pale);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-outline{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
.btn-outline:hover{background:var(--teal-pale)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-icon{padding:7px;border-radius:7px;background:var(--gray-100);color:var(--gray-600);border:none;cursor:pointer;display:inline-flex;transition:all .15s}
.btn-icon:hover{background:var(--gray-200)}
.btn-icon.del:hover{background:var(--red-pale);color:var(--red)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.section-title{font-size:17px;font-weight:700;color:var(--navy)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-credit{background:var(--green-pale);color:var(--green)}
.badge-debit{background:var(--red-pale);color:var(--red)}
.badge-income{background:var(--teal-pale);color:var(--teal)}
.badge-expense{background:var(--amber-pale);color:#B07200}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--gray-300);border-radius:8px;padding:8px 13px;min-width:220px}
.search-bar input{border:none;outline:none;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--gray-800);background:transparent;flex:1}
.search-bar svg{color:var(--gray-400);flex-shrink:0;width:14px;height:14px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filter-select{border:1.5px solid var(--gray-300);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--gray-800);outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--teal)}
.login-root{min-height:100vh;display:flex;background:var(--navy);position:relative;overflow:hidden}
.login-deco{position:absolute;inset:0;pointer-events:none}
.login-deco-circle{position:absolute;border-radius:50%;background:var(--teal);opacity:.06}
.login-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:32px;z-index:1}
.login-card{background:#fff;border-radius:20px;padding:44px 44px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{font-family:'Playfair Display',serif;font-size:32px;color:var(--navy);text-align:center;letter-spacing:.5px}
.login-sub{text-align:center;color:var(--gray-400);font-size:13px;margin-bottom:28px;margin-top:4px}
.login-tabs{display:flex;background:var(--gray-100);border-radius:10px;padding:4px;margin-bottom:24px}
.login-tab{flex:1;text-align:center;padding:9px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray-400);transition:all .2s}
.login-tab.active{background:#fff;color:var(--navy);box-shadow:var(--shadow-sm)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,39,68,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.modal-box{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:slideUp .2s}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;border-bottom:1px solid var(--gray-200)}
.modal-header h3{font-size:17px;font-weight:700;color:var(--navy)}
.modal-body{padding:24px 28px}
.modal-footer{padding:16px 28px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:10px}
.chart-wrap{position:relative;height:260px;margin-top:8px}
.log-row td{font-size:12.5px;padding:9px 16px}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--navy);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:slideUp .25s;max-width:320px}
.toast.success{background:var(--teal)}
.toast.error{background:var(--red)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){
  .sidebar{transform:translateX(-220px)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:flex!important}
  .page-content{padding:20px 16px}
  .topbar{padding:12px 16px}
  .stat-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:520px){
  .stat-grid{grid-template-columns:1fr}
  .login-card{padding:28px 20px}
  .form-grid{grid-template-columns:1fr}
}
.hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:var(--gray-100);border:none;cursor:pointer;color:var(--navy)}
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
.overlay-bg.visible{display:block}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const fmt = n => '₹' + Number(n).toLocaleString('en-IN');
const today = () => new Date().toISOString().split('T')[0];
const uid = () => Math.random().toString(36).slice(2,9);

const BASE_URL = 'http://localhost:3000/api';

const api = {
  getToken: () => localStorage.getItem('upay_token'),
  headers: () => ({
    'Content-Type': 'application/json',
    ...(localStorage.getItem('upay_token')
      ? { Authorization: `Bearer ${localStorage.getItem('upay_token')}` }
      : {}),
  }),
  login: async (username, password, role) => {
    const res  = await fetch(`${BASE_URL}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, role }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    return data;
  },
  logout: async () => {
    await fetch(`${BASE_URL}/auth/logout`, { method: 'POST', headers: api.headers() });
    localStorage.removeItem('upay_token');
  },
  getTransactions: async () => {
    const res  = await fetch(`${BASE_URL}/transactions`, { headers: api.headers() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data;
  },
  addTransaction: async (tx) => {
    const res  = await fetch(`${BASE_URL}/transactions`, {
      method: 'POST', headers: api.headers(), body: JSON.stringify(tx),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data;
  },
  updateTransaction: async (id, tx) => {
    const res  = await fetch(`${BASE_URL}/transactions/${id}`, {
      method: 'PUT', headers: api.headers(), body: JSON.stringify(tx),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data;
  },
  deleteTransaction: async (id) => {
    const res  = await fetch(`${BASE_URL}/transactions/${id}`, {
      method: 'DELETE', headers: api.headers(),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data;
  },
  getLogs: async () => {
    const res  = await fetch(`${BASE_URL}/logs`, { headers: api.headers() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data;
  },
};

const DEFAULT_PROJECTS = ['Women Safety','Annual Sports Day','Self Awareness','Education Support','Health Camp','Skill Development'];
const DEFAULT_LOCATIONS = ['Gandhi Nagar','IT Park','Jagdish Nagar','Kachipura','Laxmi Nagar','Mount Road','Sakkardara','Sitaburdi','Wardhaman Nagar'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const I = {
  dashboard: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
  project:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h18v7H3z"/></svg>,
  location:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  chart:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
  add:       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  edit:      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  del:       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
  search:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  export:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  log:       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
  logout:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="13" height="13"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
  close:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  menu:      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
  entry:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
  tx:        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
};

function ChartComp({type, data, options, id}) {
  const ref = useRef();
  const inst = useRef();
  useEffect(() => {
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {type, data, options: options||{}});
    return () => inst.current && inst.current.destroy();
  }, [JSON.stringify(data)]);
  return <canvas ref={ref} id={id}/>;
}

function Toasts({toasts}) {
  return <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={`toast ${t.kind||''}`}>{t.msg}</div>)}</div>;
}

function Modal({title,onClose,children,footer}) {
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal-box">
      <div className="modal-header">
        <h3>{title}</h3>
        <button className="btn-icon" onClick={onClose}>{I.close}</button>
      </div>
      <div className="modal-body">{children}</div>
      {footer && <div className="modal-footer">{footer}</div>}
    </div>
  </div>;
}

function TxForm({initial, onSave, onCancel, isAdmin, projects, setProjects, locations, setLocations}) {
  const blank = {date:today(), project:'', location:'', amount:'', flow:'Credit', type:'Income'};

  const initCustomProject  = initial && !DEFAULT_PROJECTS.includes(initial.project)  && initial.project  ? initial.project  : '';
  const initCustomLocation = initial && !DEFAULT_LOCATIONS.includes(initial.location) && initial.location ? initial.location : '';

  const [f, setF]                           = useState(initial || blank);
  const [errs, setErrs]                     = useState({});
  const [customProject, setCustomProject]   = useState(initCustomProject);
  const [customLocation, setCustomLocation] = useState(initCustomLocation);
  const [showCustomProject,  setShowCustomProject]  = useState(!!initCustomProject);
  const [showCustomLocation, setShowCustomLocation] = useState(!!initCustomLocation);

  const set = (k, v) => setF(p => ({...p, [k]: v}));

  const handleProjectChange = (e) => {
    const v = e.target.value;
    if (v === '__other__') {
      setShowCustomProject(true);
      setCustomProject('');
      setErrs(p => { const n={...p}; delete n.project; return n; });
    } else {
      setShowCustomProject(false);
      setCustomProject('');
      set('project', v);
      setErrs(p => { const n={...p}; delete n.project; return n; });
    }
  };

  const handleLocationChange = (e) => {
    const v = e.target.value;
    if (v === '__other__') {
      setShowCustomLocation(true);
      setCustomLocation('');
      setErrs(p => { const n={...p}; delete n.location; return n; });
    } else {
      setShowCustomLocation(false);
      setCustomLocation('');
      set('location', v);
      setErrs(p => { const n={...p}; delete n.location; return n; });
    }
  };

  const handleCustomProjectChange = (e) => {
    const val = e.target.value;
    setCustomProject(val);
    setErrs(p => { const n={...p}; delete n.project; return n; });
  };

  const handleCustomLocationChange = (e) => {
    const val = e.target.value;
    setCustomLocation(val);
    setErrs(p => { const n={...p}; delete n.location; return n; });
  };

  const submit = () => {
    const finalProject  = showCustomProject  ? customProject.trim()  : f.project;
    const finalLocation = showCustomLocation ? customLocation.trim() : f.location;

    const e = {};
    if (!f.date) e.date = 'Required';
    if (!f.amount || isNaN(f.amount) || Number(f.amount) <= 0) e.amount = 'Enter valid amount';
    if (!finalProject)  e.project  = showCustomProject  ? 'Please type the project name'  : 'Required';
    if (!finalLocation) e.location = showCustomLocation ? 'Please type the location name' : 'Required';

    setErrs(e);
    if (Object.keys(e).length) return;

    const resolved = {...f, project: finalProject, location: finalLocation, amount: Number(f.amount)};

    if (showCustomProject  && !projects.includes(finalProject))   setProjects(p => [...p, finalProject]);
    if (showCustomLocation && !locations.includes(finalLocation)) setLocations(l => [...l, finalLocation]);

    onSave(resolved);
  };

  const projectSelectVal  = showCustomProject  ? '__other__' : (f.project  || '');
  const locationSelectVal = showCustomLocation ? '__other__' : (f.location || '');

  return <>
    <div className="form-grid">
      {[['date','Transaction Date','date'],['amount','Amount','number']].map(([k,l,t])=>
        <div className="form-group" key={k}>
          <label>{l}</label>
          <input type={t} value={f[k]} onChange={e=>set(k,e.target.value)} className={errs[k]?'err':''}/>
          {errs[k] && <span className="err-msg">{errs[k]}</span>}
        </div>
      )}

      <div className="form-group">
        <label>Project Name</label>
        <select
          value={projectSelectVal}
          onChange={handleProjectChange}
          className={errs.project && !showCustomProject ? 'err' : ''}
        >
          <option value="">Select…</option>
          {projects.map(o => <option key={o} value={o}>{o}</option>)}
          <option value="__other__">Other…</option>
        </select>
        {showCustomProject && (
          <input
            type="text"
            placeholder="Type project name"
            value={customProject}
            onChange={handleCustomProjectChange}
            style={{marginTop:6}}
            className={errs.project ? 'err' : ''}
            autoFocus
          />
        )}
        {errs.project && <span className="err-msg">{errs.project}</span>}
      </div>

      <div className="form-group">
        <label>Location</label>
        <select
          value={locationSelectVal}
          onChange={handleLocationChange}
          className={errs.location && !showCustomLocation ? 'err' : ''}
        >
          <option value="">Select…</option>
          {locations.map(o => <option key={o} value={o}>{o}</option>)}
          <option value="__other__">Other…</option>
        </select>
        {showCustomLocation && (
          <input
            type="text"
            placeholder="Type location name"
            value={customLocation}
            onChange={handleCustomLocationChange}
            style={{marginTop:6}}
            className={errs.location ? 'err' : ''}
            autoFocus
          />
        )}
        {errs.location && <span className="err-msg">{errs.location}</span>}
      </div>

      <div className="form-group">
        <label>Credit / Debit</label>
        <select value={f.flow} onChange={e=>{
          const v=e.target.value;
          setF(p=>({...p, flow:v, type: v==='Debit'?'Expense':'Income'}));
        }}>
          <option value="Credit">Credit</option>
          <option value="Debit">Debit</option>
        </select>
      </div>

      <div className="form-group">
        <label>Transaction Type</label>
        <select value={f.type} onChange={e=>set('type',e.target.value)}>
          <option value="Income">Income</option>
          <option value="Expense">Expense</option>
        </select>
      </div>
    </div>

    <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>
      <button className="btn btn-outline" onClick={onCancel}>Cancel</button>
      <button className="btn btn-primary" onClick={submit}>{I.add} {initial?'Update':'Add Transaction'}</button>
    </div>
  </>;
}

function exportCSV(rows, filename='export') {
  if(!rows.length) return;
  const cols = Object.keys(rows[0]);
  const csv = [cols.join(','), ...rows.map(r=>cols.map(c=>`"${r[c]}"`).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = filename + '.csv';
  a.click();
}

function LoginPage({onLogin}) {
  const [role,setRole] = useState('admin');
  const [u,setU] = useState('');
  const [p,setP] = useState('');
  const [err,setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const doLogin = async () => {
    if (!u || !p) { setErr('Please enter username and password.'); return; }
    setLoading(true); setErr('');
    try {
      const data = await api.login(u, p, role);
      localStorage.setItem('upay_token', data.token);
      onLogin(data.user.username, data.user);
    } catch(e) {
      setErr(e.message || 'Login failed. Is the server running on localhost:3000?');
    } finally { setLoading(false); }
  };
  return <div className="login-root">
    <div className="login-deco">
      <div className="login-deco-circle" style={{width:500,height:500,right:-150,top:-150}}/>
      <div className="login-deco-circle" style={{width:300,height:300,left:-80,bottom:-80}}/>
    </div>
    <div className="login-panel">
      <div className="login-card">
        <div style={{display:'flex',justifyContent:'center',marginBottom:12}}>
          <img src="logo.png" alt="UPAY Logo" style={{width:'100%',maxWidth:360,height:'auto',objectFit:'contain',display:'block'}} onError={e=>{e.target.style.display='none'}}/>
        </div>
        <div className="login-sub">NGO Finance Tracker Portal</div>
        <div className="login-tabs">
          {['admin','staff'].map(r=><div key={r} className={`login-tab${role===r?' active':''}`} onClick={()=>{setRole(r);setErr('');}}>{r==='admin'?'Admin Login':'Staff Login'}</div>)}
        </div>
        <div className="form-group" style={{marginBottom:14}}>
          <label>Username</label>
          <input type="text" placeholder={role==='admin'?'admin':'staff1'} value={u} onChange={e=>{setU(e.target.value);setErr('')}}/>
        </div>
        <div className="form-group" style={{marginBottom:20}}>
          <label>Password</label>
          <input type="password" placeholder="••••••••" value={p} onChange={e=>{setP(e.target.value);setErr('')}} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
        </div>
        {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12,textAlign:'center'}}>{err}</div>}
        <button className="btn btn-navy" style={{width:'100%',justifyContent:'center',padding:'13px'}} onClick={doLogin} disabled={loading}>{loading ? 'Signing in…' : 'Sign In'}</button>
      </div>
    </div>
  </div>;
}
